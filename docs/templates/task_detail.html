<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>{{ task.title }}</h1>
<p>Статус: {{ task.status }}</p>
{% if task.photo %}
    <img src="{{ task.photo.url }}" width="300">
{% endif %}

<form method="post">
    {% csrf_token %}
    <button type="submit" name="change_status">Змінити статус</button>
</form>

<h3>Коментарі:</h3>
<ul>
    {% for comment in comments %}
        <li><strong>{{ comment.author.username }}:</strong> {{ comment.text }}</li>
    {% endfor %}
</ul>

{% if user.is_authenticated %}
    <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit">Додати коментар</button>
    </form>
{% endif %}
</body>
</html>
