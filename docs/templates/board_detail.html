<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Дошка: {{ board.title }}</h1>
<a href="{% url 'home' %}">Назад</a>
<ul>
    {% for task in tasks %}
    <li>
        <a href="{% url 'task_detail' task.id %}">{{ task.title }}</a> — {{ task.status }}
    </li>
    {% endfor %}
</ul>
{% if user.is_authenticated %}
<h3>Додати завдання:</h3>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %} {{ form.as_p }}
    <button type="submit">Створити</button>
</form>
{% endif %}
</body>
</html>
